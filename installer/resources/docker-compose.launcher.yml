# Enhanced Cognee - Launcher Stack
#
# Deployed by the desktop launcher (installer/launcher.py) into the per-user
# app data directory, next to a generated .env file and the database
# bootstrap SQL. Uses prebuilt images only (no source checkout needed):
#
#   - Databases: PostgreSQL+pgvector, Qdrant, ArcadeDB, Valkey
#     (default stack, 100% MIT + Apache-2.0 licensed)
#   - App images: published by .github/workflows/build-installers.yml to
#     ghcr.io (override registry/tag via IMAGE_REGISTRY / IMAGE_TAG in .env)
#
# Host ports match the Enhanced port scheme so the MCP server and SDKs work
# against the same stack: Postgres 25432, Qdrant 26333, ArcadeDB 22480/27687,
# Valkey 26379, API 8000, Dashboard 9050.

networks:
  cognee-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_storage:
  arcadedb_data:
  valkey_data:

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: enhanced-cognee-postgres
    environment:
      POSTGRES_DB: cognee_db
      POSTGRES_USER: cognee_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?generated by the launcher}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./01-init-pgvector.sql:/docker-entrypoint-initdb.d/01-init-pgvector.sql:ro
    ports:
      - "127.0.0.1:25432:5432"
    networks:
      - cognee-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognee_user -d cognee_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: enhanced-cognee-qdrant
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "127.0.0.1:26333:6333"
    networks:
      - cognee-network
    healthcheck:
      # Qdrant images ship without curl/wget; bash TCP probe instead
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/6333 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  arcadedb:
    image: arcadedata/arcadedb:26.5.1
    container_name: enhanced-cognee-arcadedb
    environment:
      JAVA_OPTS: >-
        -Darcadedb.server.rootPassword=${ARCADEDB_PASSWORD:?generated by the launcher}
        -Darcadedb.server.defaultDatabases=cognee_graph[root]
        -Darcadedb.server.plugins=Bolt:com.arcadedb.bolt.BoltPlugin
        -Darcadedb.bolt.host=0.0.0.0
        -Darcadedb.bolt.port=7687
        -Darcadedb.server.httpHost=0.0.0.0
    volumes:
      - arcadedb_data:/home/arcadedb/databases
    ports:
      - "127.0.0.1:22480:2480"
      - "127.0.0.1:27687:7687"
    networks:
      - cognee-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:2480/api/v1/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    container_name: enhanced-cognee-valkey
    command: >
      valkey-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - valkey_data:/data
    ports:
      - "127.0.0.1:26379:6379"
    networks:
      - cognee-network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend-api:
    image: ${IMAGE_REGISTRY:-ghcr.io/vincentspereira}/enhanced-cognee-api:${IMAGE_TAG:-latest}
    container_name: enhanced-cognee-api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: cognee_db
      POSTGRES_USER: cognee_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      # Graph: ArcadeDB. Bolt first (plugin enabled above), HTTP fallback.
      NEO4J_URI: bolt://arcadedb:7687
      NEO4J_USER: root
      NEO4J_PASSWORD: ${ARCADEDB_PASSWORD}
      ARCADEDB_HOST: arcadedb
      ARCADEDB_HTTP_PORT: 2480
      ARCADEDB_USER: root
      ARCADEDB_PASSWORD: ${ARCADEDB_PASSWORD}
      ARCADEDB_DATABASE: cognee_graph
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      CORS_ORIGINS: http://localhost:9050,http://127.0.0.1:9050
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - cognee-network
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      valkey:
        condition: service_healthy
      arcadedb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  dashboard:
    image: ${IMAGE_REGISTRY:-ghcr.io/vincentspereira}/enhanced-cognee-dashboard:${IMAGE_TAG:-latest}
    container_name: enhanced-cognee-dashboard
    environment:
      # Browser-reachable URL (NEXT_PUBLIC_* is baked into client-side JS)
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:9050
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "127.0.0.1:9050:9050"
    networks:
      - cognee-network
    depends_on:
      - backend-api
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9050 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped
