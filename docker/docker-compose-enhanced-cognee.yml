# Enhanced Cognee Memory Stack - Single-host Docker Compose configuration
# Replaces default Cognee stack with enterprise-grade components.
# Components: PostgreSQL+pgVector, Qdrant, ArcadeDB, Valkey, Enhanced Cognee app.
#
# Graph DB default since Phase 2: ArcadeDB (Apache-2.0, openCypher + Bolt
# drop-in for Neo4j). To run with Neo4j instead, see docs/ARCADEDB_MIGRATION.md.
#
# DEPLOY MODEL: This file targets a single-host `docker compose up -d` deploy.
#   - Networks use the `bridge` driver (overlay requires Swarm).
#   - Memory caps use top-level `mem_limit:` so they apply under plain compose.
#     The `deploy.*` blocks (replicas/placement/resources) ONLY take effect
#     under `docker stack deploy` (Swarm); they are intentionally omitted here.
#   - Published DB ports are bound to 127.0.0.1 so the databases are never
#     exposed on 0.0.0.0. Only the app port (8080) is publishable to the host.
#
# SECRETS: All credentials are REQUIRED via .env (no insecure defaults). The
# `${VAR:?message}` form makes `docker compose up` fail fast if a secret is
# unset. See .env / deploy/vps/README.md for the required variables.

networks:
  cognee-network:
    driver: bridge
    attachable: true
  ats_network:
    driver: bridge
    attachable: true
  oma_network:
    driver: bridge
    attachable: true
  smc_network:
    driver: bridge
    attachable: true

volumes:
  postgres_data:
    driver: local
  qdrant_storage:
    driver: local
  # ArcadeDB persistent storage (Phase 2 default).
  # Legacy neo4j_* volumes retained so users who set
  # ENHANCED_GRAPH_PROVIDER=neo4j can still mount their existing data; the
  # arcadedb service below uses arcadedb_data only.
  arcadedb_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  redis_data:
    driver: local
  enhanced_cognee_data:
    driver: local

services:
  # PostgreSQL 18 + pgVector - Enhanced Relational Database (replaces SQLite)
  postgres:
    image: pgvector/pgvector:pg18  # UPGRADED to PostgreSQL 18 with pgVector
    container_name: postgres-enhanced-cognee
    environment:
      POSTGRES_DB: cognee_db
      POSTGRES_USER: cognee_user
      # Password is REQUIRED -- no insecure default. The pg image uses this
      # with scram-sha-256 auth (POSTGRES_HOST_AUTH_METHOD=trust removed).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      # PostgreSQL 18 specific optimizations
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      POSTGRES_SHARED_PRELOAD_LIBRARIES: "vector"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
      - ./postgresql18.conf:/etc/postgresql/postgresql.conf:ro  # PostgreSQL 18 config
    ports:
      - "127.0.0.1:25432:5432"  # PostgreSQL -- bound to localhost only
    networks:
      - cognee-network
    # mem_limit applies under standalone compose; deploy.resources (below) is
    # honoured only under Swarm (`docker stack deploy`).
    mem_limit: 4g
    mem_reservation: 2g
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 4G  # Increased for PostgreSQL 18 performance
        reservations:
          memory: 2G  # Increased for PostgreSQL 18 performance
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognee_user -d cognee_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Qdrant - Enhanced Vector Database (replaces LanceDB)
  qdrant:
    image: qdrant/qdrant:v1.11.1
    container_name: qdrant-enhanced-cognee
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
      QDRANT__SERVICE__MAX_REQUEST_SIZE_MB: 32
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: 4
      QDRANT__STORAGE__PERFORMANCE__MAX_OPTIMIZATION_THREADS: 1
      # Optional API key -- when set in .env, Qdrant requires it on every request.
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "127.0.0.1:26333:6333"  # HTTP API -- bound to localhost only
      - "127.0.0.1:26334:6334"  # gRPC API -- bound to localhost only
    networks:
      - cognee-network
    mem_limit: 4g
    mem_reservation: 2g
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/6333 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ArcadeDB - Enhanced Graph Database (Phase 2 default; Apache-2.0)
  # Multi-model (graph + document + KV + vector + time-series) with native
  # openCypher and Bolt protocol -- drop-in for our existing neo4j Python
  # driver paths via the ENHANCED_GRAPH_PROVIDER=arcadedb factory route.
  # See docs/ARCADEDB_MIGRATION.md for the migration story.
  arcadedb:
    # Pinned to a confirmed-recent stable tag (was :latest). Bump deliberately.
    image: arcadedata/arcadedb:26.5.1
    container_name: arcadedb-enhanced-cognee
    environment:
      # ArcadeDB server tuning + Bolt plugin enablement.
      # Default admin user is root; password matches NEO4J_PASSWORD/
      # ARCADEDB_PASSWORD for an easy migration (existing creds keep working
      # when the URI stays at bolt://localhost:27687). REQUIRED -- no default.
      JAVA_OPTS: >-
        -Darcadedb.server.rootPassword=${ARCADEDB_PASSWORD:-${NEO4J_PASSWORD:?set NEO4J_PASSWORD or ARCADEDB_PASSWORD in .env}}
        -Darcadedb.server.defaultDatabases=cognee_graph[root]
        -Darcadedb.server.plugins=Bolt:com.arcadedb.bolt.BoltPlugin
        -Darcadedb.bolt.host=0.0.0.0
        -Darcadedb.bolt.port=7687
        -Darcadedb.server.httpHost=0.0.0.0
    volumes:
      - arcadedb_data:/home/arcadedb/databases
    ports:
      - "127.0.0.1:22480:2480"  # Studio HTTP -- bound to localhost only
      - "127.0.0.1:27687:7687"  # Bolt -- bound to localhost only (drop-in for Neo4j)
    networks:
      - cognee-network
    mem_limit: 3g
    mem_reservation: 1g
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:2480/api/v1/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Valkey - Apache-2.0 Redis fork; wire-compatible cache layer
  # (Replaced Redis 7.4 which switched to BSL/SSPL; see docs/LICENSE_AUDIT.md)
  # The Python `redis` client library still works unchanged against Valkey.
  #
  # NOTE: service name kept as 'redis' so that other services' connection
  # strings (REDIS_HOST: redis) keep working without env-var rewrites.
  # The container_name is the user-visible name (cognee-mcp-valkey) to match
  # the cognee-mcp-* pattern of the other services.
  #
  # REDIS_PASSWORD is optional. When set in .env, --requirepass is enabled via
  # the shell-form command below; when unset, Valkey runs without auth on the
  # localhost-only published port. The `$$` escapes compose interpolation so
  # REDIS_PASSWORD is read from the container env at runtime, not baked in.
  redis:
    image: valkey/valkey:8-alpine
    container_name: cognee-mcp-valkey
    command: ["sh", "-c", "exec valkey-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru ${REDIS_PASSWORD:+--requirepass \"$$REDIS_PASSWORD\"}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:26379:6379"  # Valkey (Redis-compatible) -- bound to localhost only
    networks:
      - cognee-network
    # Note: `deploy.placement.constraints` and `deploy.replicas` removed --
    # those are Swarm-only directives that fail on standalone Docker. The
    # `mem_limit` below works on both standalone and Swarm.
    mem_limit: 1500m
    mem_reservation: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Enhanced Cognee MCP Server - Main Memory Provider (FastAPI HTTP app)
  enhanced-cognee:
    build:
      context: ..
      dockerfile: docker/Dockerfile.enhanced-cognee
    container_name: enhanced-cognee-server
    # Explicit command (the Dockerfile CMD does the same). NO --reload in prod.
    command: ["python", "-m", "uvicorn", "src.enhanced_cognee_mcp:app", "--host", "0.0.0.0", "--port", "8080"]
    # Pull all runtime config (secrets + tunables) from the project .env file.
    env_file:
      - ../.env
    environment:
      # Enhanced Stack Configuration
      ENHANCED_COGNEE_MODE: "true"

      # PostgreSQL Configuration (replaces SQLite)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: cognee_db
      POSTGRES_USER: cognee_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}

      # Qdrant Configuration (replaces LanceDB)
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_PREFIX: "cognee_"

      # Graph DB Configuration -- ArcadeDB is the default since Phase 2.
      # Set ENHANCED_GRAPH_PROVIDER=neo4j (and add a neo4j service block) to
      # opt back into Neo4j; see docs/ARCADEDB_MIGRATION.md.
      ENHANCED_GRAPH_PROVIDER: arcadedb
      ARCADEDB_URI: bolt://arcadedb:7687
      ARCADEDB_USER: root
      ARCADEDB_PASSWORD: ${ARCADEDB_PASSWORD:-${NEO4J_PASSWORD:?set NEO4J_PASSWORD or ARCADEDB_PASSWORD in .env}}

      # Legacy Neo4j env vars retained so callers still passing them
      # explicitly (NEO4J_URI / NEO4J_USER / NEO4J_PASSWORD) keep working.
      NEO4J_URI: bolt://arcadedb:7687
      NEO4J_USER: root
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-${ARCADEDB_PASSWORD:?set NEO4J_PASSWORD or ARCADEDB_PASSWORD in .env}}
      NEO4J_DATABASE: cognee_graph

      # Redis Configuration (Valkey cache layer)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0
      REDIS_CACHE_TTL: 3600

      # LLM Configuration -- API key is REQUIRED (no embedded default key).
      LLM_API_KEY: ${LLM_API_KEY:?LLM_API_KEY must be set in .env}
      LLM_MODEL: ${LLM_MODEL:-glm-4.6}
      LLM_PROVIDER: ${LLM_PROVIDER:-zai}
      LLM_ENDPOINT: ${LLM_ENDPOINT:-https://api.z.ai/api/coding/paas/v4}

      # Embedding Configuration (existing)
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embedding:4b-q4_K_M}
      EMBEDDING_ENDPOINT: ${EMBEDDING_ENDPOINT:-http://localhost:11434/api/embed}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-2560}

      # API auth + environment -- the app FAILS CLOSED if these are missing
      # in production. Set ENHANCED_ENV=production and a strong ENHANCED_API_KEY.
      ENHANCED_API_KEY: ${ENHANCED_API_KEY:?set ENHANCED_API_KEY in .env}
      ENHANCED_ENV: ${ENHANCED_ENV:-production}

      # Enhanced Features
      MEMORY_CATEGORIZATION: "true"
      ATS_MEMORY_PREFIX: "ats_"
      OMA_MEMORY_PREFIX: "oma_"
      SMC_MEMORY_PREFIX: "smc_"
      PERFORMANCE_MONITORING: "true"
      AUTO_OPTIMIZATION: "true"

      # Runtime safety toggles
      ACCEPT_LOCAL_FILE_PATH: "True"
      ALLOW_HTTP_REQUESTS: "True"
      ALLOW_CYPHER_QUERY: "True"
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - enhanced_cognee_data:/app/data
    ports:
      # App HTTP port. Publishable to the host for direct access. When running
      # behind a reverse proxy (Caddy/Nginx), bind to localhost instead:
      #   - "127.0.0.1:28080:8080"
      - "28080:8080"  # HTTP API (host 28080 -> container 8080)
    networks:
      - cognee-network
      - ats_network
      - oma_network
      - smc_network
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      arcadedb:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 4g
    mem_reservation: 2g
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    restart: unless-stopped
    healthcheck:
      # Liveness probe -- /health/live returns 200 while the process is up.
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
