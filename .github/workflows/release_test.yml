# Long-running, heavy and resource-consuming tests for release validation
# NOTE (RNR Enhanced Cognee): converted to manual-only because the underlying
# load_tests.yml requires upstream-only secrets (LLM_API_KEY, AWS_*, etc.)
# that this fork does not configure. Run manually via the Actions tab when
# you have those secrets provisioned.
name: Release Test Workflow (manual only)

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  load-tests:
    name: Load Tests
    uses: ./.github/workflows/load_tests.yml
    secrets: inherit