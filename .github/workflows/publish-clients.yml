name: Publish Client SDKs

# Publishes the Node, Go (via tag-only -- pkg.go.dev auto-indexes), and Rust
# SDKs on a tagged release.
#
# Tag conventions:
#   clients-node-v<X.Y.Z>   -> publishes to npm @enhanced-cognee/client
#   clients-rust-v<X.Y.Z>   -> publishes to crates.io enhanced-cognee-client
#   clients-go-v<X.Y.Z>     -> Go modules use Git-tag-only publishing; the
#                              tag itself is the "release", pkg.go.dev's
#                              proxy auto-indexes from proxy.golang.org
#                              within ~30 minutes. No CI step needed.
#
# Repo secrets required:
#   NPM_TOKEN              -- npmjs.com automation token
#   CARGO_REGISTRY_TOKEN   -- crates.io API token
#
# Manual trigger (workflow_dispatch) is available for ad-hoc publishes
# without creating a tag (useful for dry-runs against a test registry).

on:
  push:
    tags:
      - "clients-node-v*.*.*"
      - "clients-rust-v*.*.*"
      - "clients-go-v*.*.*"
  workflow_dispatch:
    inputs:
      client:
        description: "Which SDK to publish (node / rust / go-noop)"
        type: choice
        options: [node, rust, go-noop]
        required: true
      dry_run:
        description: "Dry-run (skip the actual publish step)"
        type: boolean
        default: true

jobs:
  publish-node:
    if: |
      startsWith(github.ref, 'refs/tags/clients-node-v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.client == 'node')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"
      - name: Install deps + build
        working-directory: clients/node
        run: |
          npm ci || npm install
          npm run build
      - name: Run tests
        working-directory: clients/node
        run: npm test
      - name: Publish to npm
        if: ${{ github.event_name == 'push' || github.event.inputs.dry_run != 'true' }}
        working-directory: clients/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
      - name: Dry-run pack
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: clients/node
        run: npm pack --dry-run

  publish-rust:
    if: |
      startsWith(github.ref, 'refs/tags/clients-rust-v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.client == 'rust')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo test
        working-directory: clients/rust
        run: cargo test --no-fail-fast
      - name: Cargo publish (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: clients/rust
        run: cargo publish --dry-run
      - name: Cargo publish
        if: ${{ github.event_name == 'push' || github.event.inputs.dry_run != 'true' }}
        working-directory: clients/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"

  publish-go-noop:
    if: |
      startsWith(github.ref, 'refs/tags/clients-go-v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.client == 'go-noop')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Go test
        working-directory: clients/go
        run: go test ./...
      - name: Notice -- Go modules use tag-only publishing
        run: |
          echo "Go modules are published via git tags alone."
          echo "Tag $GITHUB_REF_NAME has been pushed; proxy.golang.org will"
          echo "auto-index this module within ~30 minutes."
          echo ""
          echo "Verify by running:"
          echo "  go list -m github.com/vincentspereira/Enhanced-Cognee/clients/go@$GITHUB_REF_NAME"
          echo ""
          echo "View on pkg.go.dev:"
          echo "  https://pkg.go.dev/github.com/vincentspereira/Enhanced-Cognee/clients/go@$GITHUB_REF_NAME"
