name: SBOM (Software Bill of Materials)

# Generates a Software Bill of Materials for the Python dependency tree
# and the license summary, then publishes the artefacts. Triggered on:
#   - push to main (refresh the canonical SBOM)
#   - tag releases (attach SBOM artefacts to the release)
#   - manual dispatch
#
# Two formats are produced:
#   sbom.cdx.json    - CycloneDX (industry-standard SBOM format, used by
#                      most vulnerability scanners)
#   sbom-licenses.md - Markdown table of (package, version, license) for
#                      humans + audit trails
#
# Tracked as HANDOVER section 5 (H2) -- the "SBOM step in CI" gap.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Enhanced Cognee + SBOM tooling
        run: |
          python -m pip install --upgrade pip
          pip install cyclonedx-bom pip-licenses
          # Install runtime deps (without optional adapter extras -- the
          # SBOM reflects the *default* dependency tree, not every opt-in
          # adapter). Optional extras' deps appear in pyproject.toml and
          # are documented in docs/PROFILES.md.
          pip install -r requirements.txt
          pip install -e .

      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-py environment \
            --output-format json \
            --outfile sbom.cdx.json
          echo "SBOM size: $(wc -c < sbom.cdx.json) bytes"
          echo "Package count: $(jq '.components | length' sbom.cdx.json)"

      - name: Generate license summary (Markdown)
        run: |
          {
            echo "# Enhanced Cognee - License Summary"
            echo ""
            echo "Generated by .github/workflows/sbom.yml at \
                  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "for commit ${GITHUB_SHA}."
            echo ""
            echo "See docs/LICENSE_AUDIT.md for the curated audit;"
            echo "this file is the machine-generated complement."
            echo ""
            pip-licenses \
              --format=markdown \
              --with-urls \
              --with-license-file \
              --no-license-path \
              --order=license
          } > sbom-licenses.md
          echo "Lines: $(wc -l < sbom-licenses.md)"

      - name: Upload SBOM artefacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.cdx.json
            sbom-licenses.md
          retention-days: 90

      # On release publication, attach the SBOM to the release assets.
      - name: Attach SBOM to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            sbom.cdx.json sbom-licenses.md \
            --clobber
