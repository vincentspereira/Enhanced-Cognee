# Enhanced Cognee Database Stack
# PostgreSQL 18 + pgvector, Qdrant, Valkey, ArcadeDB
#
# ArcadeDB replaces Neo4j (Phase 2: default graph DB swapped to ArcadeDB
# in PR #20; Bolt-plugin transport + HTTP/JSON transport added in PR #33).
# Valkey replaces Redis (Phase 5 license refresh; Valkey is wire-compatible).
#
# All four services run on the `enhanced-cognee` user-defined network so
# they can resolve each other via service-name DNS.

networks:
  enhanced-cognee:
    name: enhanced-cognee
    driver: bridge

volumes:
  enhanced_cognee_mcp_postgres_data:
    name: enhanced_cognee_mcp_postgres_data
    driver: local
  enhanced_cognee_mcp_qdrant_data:
    name: enhanced_cognee_mcp_qdrant_data
    driver: local
  enhanced_cognee_mcp_valkey_data:
    # Existing volume from the prior stack (created when Valkey replaced
    # Redis without renaming the on-disk volume). Reusing it preserves
    # cached state across the compose swap.
    name: cognee_mcp_valkey_data
    external: true
  enhanced_cognee_mcp_arcadedb_data:
    name: enhanced_cognee_mcp_arcadedb_data
    driver: local

services:
  # PostgreSQL 18 + pgvector - Enhanced Cognee relational + vector extension
  cognee-mcp-postgres:
    image: pgvector/pgvector:pg18
    container_name: cognee-mcp-postgres
    labels:
      - "com.enhanced-cognee.project=enhanced-cognee"
      - "com.enhanced-cognee.type=database"
      - "com.enhanced-cognee.service=postgres"
    environment:
      POSTGRES_DB: cognee_db
      POSTGRES_USER: cognee_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      POSTGRES_SHARED_PRELOAD_LIBRARIES: "vector"
    volumes:
      - enhanced_cognee_mcp_postgres_data:/var/lib/postgresql
    ports:
      - "25432:5432"  # PostgreSQL (Enhanced Cognee)
    networks:
      - enhanced-cognee
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognee_user -d cognee_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Qdrant - Enhanced Cognee vector database
  cognee-mcp-qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: cognee-mcp-qdrant
    labels:
      - "com.enhanced-cognee.project=enhanced-cognee"
      - "com.enhanced-cognee.type=vector-db"
      - "com.enhanced-cognee.service=qdrant"
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
      # API-key authentication. Qdrant enforces this key on every request once
      # set (read at startup -> requires a container recreate). Provide the
      # value via QDRANT_API_KEY (shell env, --env-file, or config/docker/.env);
      # the SAME key must be in the Enhanced Cognee app / MCP server environment
      # or all vector operations will fail with 401/403.
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY must be set to enable Qdrant auth}
      QDRANT__SERVICE__MAX_REQUEST_SIZE_MB: 32
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: 4
      QDRANT__STORAGE__PERFORMANCE__MAX_OPTIMIZATION_THREADS: 1
    volumes:
      - enhanced_cognee_mcp_qdrant_data:/qdrant/storage
    ports:
      - "26333:6333"  # HTTP API (Enhanced Cognee)
      - "26334:6334"  # gRPC API (Enhanced Cognee)
    networks:
      - enhanced-cognee
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "[ -f /qdrant/storage/raft_state.json ] || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Valkey - Enhanced Cognee cache layer (Apache-2.0, wire-compatible with Redis)
  cognee-mcp-valkey:
    image: valkey/valkey:8-alpine
    container_name: cognee-mcp-valkey
    labels:
      - "com.enhanced-cognee.project=enhanced-cognee"
      - "com.enhanced-cognee.type=cache"
      - "com.enhanced-cognee.service=valkey"
    command: valkey-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - enhanced_cognee_mcp_valkey_data:/data
    ports:
      - "26379:6379"  # Valkey (Enhanced Cognee; speaks Redis protocol)
    networks:
      - enhanced-cognee
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ArcadeDB - Enhanced Cognee graph database (Apache-2.0; default since Phase 2)
  #
  # The Enhanced Cognee adapter at src/db_adapters/graph_arcadedb.py supports
  # both transports:
  #   - ARCADEDB_TRANSPORT=http (recommended for this compose) routes through
  #     the stock /api/v1/command/{db} REST endpoint. Works out of the box
  #     with the public arcadedata/arcadedb:latest image -- no extra plugin
  #     required. Use port 22480 on the host (mapped from 2480 in-container).
  #   - ARCADEDB_TRANSPORT=bolt routes through the neo4j Python driver
  #     against the Bolt port. Requires the BoltPlugin JAR to be mounted into
  #     the container's lib/plugins/ directory (the JAVA_OPTS below tries to
  #     enable it, but the public image doesn't ship the plugin file -- you
  #     have to drop the JAR into a volume mount yourself, see ArcadeDB docs).
  #
  # When using this compose, set ARCADEDB_TRANSPORT=http in the MCP server
  # environment. The Bolt port mapping is kept so users who add the plugin
  # JAR get a drop-in Neo4j Python driver replacement on 27687.
  cognee-mcp-arcadedb:
    image: arcadedata/arcadedb:latest
    container_name: cognee-mcp-arcadedb
    hostname: cognee-mcp-arcadedb
    labels:
      - "com.enhanced-cognee.project=enhanced-cognee"
      - "com.enhanced-cognee.type=graph-db"
      - "com.enhanced-cognee.service=arcadedb"
    environment:
      # Root password aligns with the legacy NEO4J_PASSWORD env so existing
      # client configs (NEO4J_URI / NEO4J_USER / NEO4J_PASSWORD) keep working
      # when ENHANCED_GRAPH_PROVIDER=arcadedb is in effect.
      JAVA_OPTS: >-
        -Darcadedb.server.rootPassword=${ARCADEDB_PASSWORD:?ARCADEDB_PASSWORD must be set in .env}
        -Darcadedb.server.defaultDatabases=cognee_graph[root]
        -Darcadedb.bolt.host=0.0.0.0
        -Darcadedb.bolt.port=7687
        -Darcadedb.server.httpHost=0.0.0.0
    volumes:
      - enhanced_cognee_mcp_arcadedb_data:/home/arcadedb/databases
    ports:
      - "22480:2480"  # Studio HTTP UI + REST API (was 27474 for Neo4j browser)
      - "27687:7687"  # Bolt (kept on 27687 host port -- drop-in for Neo4j)
    networks:
      - enhanced-cognee
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    restart: unless-stopped
    # Healthcheck intentionally omitted: the public arcadedata/arcadedb image
    # ships without wget / curl, so any HEALTHCHECK that depends on those
    # binaries reports "unhealthy" indefinitely. Docker reports running-state
    # health via container status instead; the Bolt + HTTP probes from the
    # MCP server initialisation are the authoritative readiness signal.
