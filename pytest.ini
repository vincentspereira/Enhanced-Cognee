[pytest]
# Pytest Configuration for Enhanced Cognee

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --color=yes
    -ra

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Warning filters
# Strategy: treat warnings as errors by default so new warnings break CI.
# Then whitelist only the known external-library issues we cannot fix ourselves.
# Each whitelist entry must have a tracking-issue comment.
filterwarnings =
    error
    # Our own pytest marker warnings — safe to ignore
    ignore::pytest.PytestUnknownMarkWarning
    # litellm uses deprecated asyncio.iscoroutinefunction; upstream issue:
    # https://github.com/BerriAI/litellm/issues (Python 3.16 will remove it)
    ignore::DeprecationWarning:litellm
    # qdrant-client RuntimeWarning on http connection close during pytest teardown:
    # https://github.com/qdrant/qdrant-client/issues/665
    ignore::RuntimeWarning:qdrant_client
    # neo4j BoltDriver ResourceWarning during pytest teardown (interpreter shutdown order):
    # https://github.com/neo4j/neo4j-python-driver/issues
    ignore::ResourceWarning:neo4j
    # redis async Connection ResourceWarning during pytest teardown:
    # https://github.com/redis/redis-py/issues
    ignore::ResourceWarning:redis
    # asyncio stdlib ResourceWarning: loop is closed -- happens during teardown
    # when pytest's event loop is closed before all client tasks complete
    ignore::ResourceWarning:asyncio
    # Pytest's own deprecation warnings about plugins / config -- not actionable here
    ignore::pytest.PytestDeprecationWarning
    # hypothesis deprecation warnings -- upgrade tracked separately
    ignore::DeprecationWarning:hypothesis
    # pytest unraisable-exception warnings: triggered by external client
    # destructors (qdrant, neo4j, redis) running during interpreter teardown
    # after pytest has already closed the event loop. Not our bug to fix.
    ignore::pytest.PytestUnraisableExceptionWarning
    # Unraisable warnings from GC of async clients during teardown
    ignore::ResourceWarning

# Coverage configuration
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    */venv/*
    */.venv/*
branch = True

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
fail_under = 98.0

[coverage:html]
directory = htmlcov

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database required)
    system: System tests (full stack)
    e2e: End-to-end tests (user workflows)
    slow: Slow-running tests
    redis: Tests requiring Redis
    postgresql: Tests requiring PostgreSQL
    qdrant: Tests requiring Qdrant
    neo4j: Tests requiring Neo4j
    mcp: MCP protocol tests
