[pytest]
# Pytest Configuration for Enhanced Cognee

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --color=yes
    -ra

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Warning filters
# Strategy: treat warnings as errors by default so new warnings break CI.
# Then whitelist only the known external-library issues we cannot fix ourselves.
# Each whitelist entry must have a tracking-issue comment.
filterwarnings =
    error
    # Our own pytest marker warnings — safe to ignore
    ignore::pytest.PytestUnknownMarkWarning
    # litellm uses deprecated asyncio.iscoroutinefunction; upstream issue:
    # https://github.com/BerriAI/litellm/issues (Python 3.16 will remove it)
    ignore::DeprecationWarning:litellm
    # qdrant-client RuntimeWarning on http connection close during pytest teardown:
    # https://github.com/qdrant/qdrant-client/issues/665
    ignore::RuntimeWarning:qdrant_client
    # neo4j BoltDriver ResourceWarning during pytest teardown (interpreter shutdown order):
    # https://github.com/neo4j/neo4j-python-driver/issues
    ignore::ResourceWarning:neo4j
    # redis async Connection ResourceWarning during pytest teardown:
    # https://github.com/redis/redis-py/issues
    ignore::ResourceWarning:redis
    # asyncio stdlib ResourceWarning: loop is closed -- happens during teardown
    # when pytest's event loop is closed before all client tasks complete
    ignore::ResourceWarning:asyncio
    # Pytest's own deprecation warnings about plugins / config -- not actionable here
    ignore::pytest.PytestDeprecationWarning
    # hypothesis deprecation warnings -- upgrade tracked separately
    ignore::DeprecationWarning:hypothesis
    # pytest unraisable-exception warnings: triggered by external client
    # destructors (qdrant, neo4j, redis) running during interpreter teardown
    # after pytest has already closed the event loop. Not our bug to fix.
    ignore::pytest.PytestUnraisableExceptionWarning
    # Unraisable warnings from GC of async clients during teardown
    ignore::ResourceWarning
    # passlib 1.7.4 imports the deprecated `crypt` stdlib module at module-load
    # time. CPython slated `crypt` for removal in 3.13. passlib hasn't shipped a
    # fix yet (last release 2020). Tracked: https://foss.heptapod.net/python-libraries/passlib/-/issues/188
    ignore::DeprecationWarning:passlib
    # CPython's own _deprecated warnings (triggered by passlib's crypt import on
    # 3.11+; the warning is emitted from stdlib warnings.py, not the passlib module)
    ignore:'crypt' is deprecated:DeprecationWarning
    # PyJWT 2.x raises InsecureKeyLengthWarning for HMAC keys shorter than
    # 32 bytes (RFC 7518 Section 3.2). Many of our unit tests intentionally
    # use short, fixed keys ("secret123" etc.) because they're testing JWT
    # mechanics, not key strength. Production code uses 32+ byte keys via
    # `secrets.token_urlsafe(32)`. Use a message-regex filter because
    # pytest can't always resolve `jwt.warnings.InsecureKeyLengthWarning`
    # at startup (the jwt module isn't loaded yet).
    ignore:The HMAC key is .* bytes long, which is below the minimum recommended length
    # starlette >=0.47 raises StarletteDeprecationWarning at import time of
    # starlette.testclient ("Using `httpx` with `starlette.testclient` is
    # deprecated; install `httpx2` instead"). httpx2 does not exist yet, so
    # there is no fix to apply; the warning fires on import (breaking collection
    # of every TestClient-using test under filterwarnings=error). Message-regex
    # filter because the warning class isn't importable at pytest startup.
    # Tracked: https://github.com/encode/starlette/discussions (httpx2 migration)
    ignore:Using .httpx. with .starlette.testclient. is deprecated

# Coverage configuration
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    */venv/*
    */.venv/*
    */cognee/*
branch = True

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
fail_under = 85.0
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

[coverage:html]
directory = htmlcov

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database required)
    system: System tests (full stack)
    e2e: End-to-end tests (user workflows)
    slow: Slow-running tests
    redis: Tests requiring Redis
    postgresql: Tests requiring PostgreSQL
    qdrant: Tests requiring Qdrant
    neo4j: Tests requiring Neo4j
    arcadedb: Tests requiring ArcadeDB (Bolt on port 26687)
    apache_age: Tests requiring Apache AGE Postgres extension
    mcp: MCP protocol tests
