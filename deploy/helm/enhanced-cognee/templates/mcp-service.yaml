apiVersion: v1
kind: Service
metadata:
  name: {{ include "enhanced-cognee.mcp.fullname" . }}
  labels:
    {{- include "enhanced-cognee.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
  {{- with .Values.mcpServer.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.mcpServer.service.type }}
  ports:
    - port: {{ .Values.mcpServer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "enhanced-cognee.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
{{- if .Values.mcpServer.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "enhanced-cognee.mcp.fullname" . }}
  labels:
    {{- include "enhanced-cognee.labels" . | nindent 4 }}
  {{- with .Values.mcpServer.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.mcpServer.ingress.className }}
  ingressClassName: {{ .Values.mcpServer.ingress.className }}
  {{- end }}
  {{- if .Values.mcpServer.ingress.tls }}
  tls:
    {{- toYaml .Values.mcpServer.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.mcpServer.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "enhanced-cognee.mcp.fullname" $ }}
                port:
                  number: {{ $.Values.mcpServer.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
