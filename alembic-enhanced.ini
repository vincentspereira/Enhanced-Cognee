# Alembic configuration for Enhanced Cognee PostgreSQL schema
# Run via: enhanced-cognee migrate [up|down|current|history]

[alembic]
script_location = alembic_enhanced
version_locations = alembic_enhanced/versions

# PostgreSQL DSN - placeholder only. env.py builds the real DSN from the
# POSTGRES_* environment variables (POSTGRES_PASSWORD is required, no default).
sqlalchemy.url = postgresql+asyncpg://cognee_user:CHANGE-ME-set-POSTGRES_PASSWORD@localhost:25432/cognee_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
